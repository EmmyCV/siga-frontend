<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Estudiante</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        /* Estilos personalizados */
        body {
            font-family: Arial, sans-serif;
        }
        .sidebar {
            height: 100vh;
            background-color: #851919;
            color: white;
            padding-top: 20px;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            margin: 10px 0;
            display: block;
            padding: 10px;
        }
        .sidebar a:hover {
            background-color: #851919;
        }
        .content {
            padding: 20px;
        }
        .navbar {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <div class="sidebar col-2">
            <h4 class="text-center">ESTUDIANTES</h4>
            <p class="text-center">Emmy Daiana</p>
            <hr>
            <a href="{% url 'informacion_estudiantil' %}"><i class="fas fa-user"></i> Información Estudiantil</a>
            <a href="#"><i class="fas fa-book"></i> Información Académica</a>
            <a href="#"><i class="fas fa-clock"></i> Horario</a>
            <a href="#"><i class="fas fa-list-alt"></i> Notas</a>
            <a href="#"><i class="fas fa-money-bill"></i> Deudas</a>
            <a href="#"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
        </div>

        <!-- Main Content -->
        <div class="col-10">
            <!-- Navbar -->
            <nav class="navbar navbar-expand-lg navbar-light">
                <div class="container-fluid">
                    <span class="navbar-text">
                        Bienvenido al sistema, Emmy Daiana
                    </span>
                    <span class="navbar-text ms-auto">
                        <i class="fas fa-calendar-alt"></i> Jueves, 21 de Noviembre de 2024
                    </span>
                </div>
            </nav>

            <!-- Dynamic Content -->
            <div class="content">
                {% block content %}
                <!-- Aquí se inserta el contenido de cada vista -->
                {% endblock %}
            </div>
        </div>
    </div>
</body>
</html>
